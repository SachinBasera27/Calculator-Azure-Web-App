name: Deploy to Azure Web App
 
on:
  push:
    branches:
      - main
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      # Step 1: Check out your repo code
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # Step 2: Set up Python 3.12 (stable, avoid 3.14 pre-release)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      # Step 3: Create virtual environment named 'antenv' (Azure looks for this name)
      # and install all dependencies inside it
      - name: Create virtual env and install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
 
      # Step 4: Zip everything including the antenv folder
      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "*.git*"
 
      # Step 5: Deploy the zip to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: release.zip
 
