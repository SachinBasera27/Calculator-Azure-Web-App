name: Build and deploy Python app to Azure Web App - Python-Calc

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and activate virtual environment
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Zip artifact preserving folder structure
        run: |
          zip -r release.zip . \
            --exclude "*.git*" \
            --exclude "antenv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6E4793B6C4F64F3FA597C5730EF24448 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBA40761E4474D2EA31C0694190B90A1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DC302E326AC84F02979FD2193ADFEF53 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Python-Calc'
          slot-name: 'Production'
          package: release.zip
         
          
